name: Daily Scraper (March 15 - Oct 15)

on:
  workflow_dispatch: # Triggered manually or via API webhook (e.g. cron-job.org)

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Protect the date boundaries (March 15 to October 15)
      - name: Check if current date is within range
        run: |
          MONTH=$(date +%m)
          DAY=$(date +%d)
          
          # If it's March and before the 15th, cancel the run safely
          if [ "$MONTH" -eq 3 ] && [ "$DAY" -lt 15 ]; then
            echo "Today is before March 15th. Skipping scrape."
            exit 0
          fi
          
          # If it's October and after the 15th, cancel the run safely
          if [ "$MONTH" -eq 10 ] && [ "$DAY" -gt 15 ]; then
            echo "Today is after October 15th. Skipping scrape."
            exit 0
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install axios cheerio

      - name: Run Scraper
        run: node scraper.js

      - name: Commit and Push if data changed
        run: |
          git config --global user.name "GitHub Action Scraper"
          git config --global user.email "actions@github.com"
          git add data.json
          git diff-index --quiet HEAD || git commit -m "Automated data update [skip ci]"
          git push