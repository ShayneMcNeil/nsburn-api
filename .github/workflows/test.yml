name: CI Test Suite

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'data.json'
      - 'README.md'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so we can pull successfully later

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Wait for Render Deployment
        run: |
          echo "Waiting 2.5 minutes for Render to finish deploying the new server code..."
          sleep 150

      - name: Trigger Scraper Workflow and Wait
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering scrape.yml..."
          gh workflow run scrape.yml
          
          echo "Waiting 10 seconds for the run to initialize..."
          sleep 10
          
          echo "Watching scrape.yml run to complete..."
          RUN_ID=$(gh run list --workflow=scrape.yml --limit=1 --json databaseId --jq '.[0].databaseId')
          echo "Watching Run ID: $RUN_ID"
          gh run watch $RUN_ID

      - name: Pull latest data.json from GitHub
        run: |
          git config --global user.name "GitHub Action Test"
          git config --global user.email "actions@github.com"
          git pull origin main

      - name: Run Integration Tests against deployed endpoint
        env:
          RENDER_URL: ${{ vars.RENDER_URL || secrets.RENDER_URL }}
        run: |
          if [ -z "$RENDER_URL" ]; then
            echo "⚠️ Warning: RENDER_URL is not set in GitHub secrets or variables."
            echo "Running test locally instead..."
            npm test
          else
            echo "Running integration test against deployed URL: $RENDER_URL"
            RENDER_URL=$RENDER_URL npm test
          fi
